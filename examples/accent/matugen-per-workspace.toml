# matugen — slim per-workspace accent config used by accent.sh.
#
# Why a separate config: the user's main matugen config (typically
# ~/.config/matugen/config.toml) regenerates *every* themed app on each
# run — gtk/qt/helix/ghostty/etc. — and triggers `hyprctl reload`.
# That's appropriate for the slow path (wallpaper-rotate on a 6h timer)
# but takes ~3.5s end-to-end, far too slow to run on each workspace
# switch. This config renders only the shared accent files and skips
# all heavy reload hooks; accent.sh handles live Hyprland keyword
# pushes separately.
#
# Assumes ~/.config/matugen/templates/shared-accent.{css,conf,ini}
# exist. They typically already do — they're the same templates the
# main matugen config points at.

[config]
reload_apps = false
custom_colors = {}

[templates.shared-accent-css]
input_path = "~/.config/matugen/templates/shared-accent.css"
output_path = "~/.config/themes/accent.css"
post_hook = "pkill -SIGUSR2 waybar 2>/dev/null; swaync-client --reload-css 2>/dev/null; true"

[templates.shared-accent-conf]
input_path = "~/.config/matugen/templates/shared-accent.conf"
output_path = "~/.config/themes/accent.conf"
# No post_hook — accent.sh does the live `hyprctl --batch keyword`
# push using the rendered $primary/$tertiary/etc values. Avoids the
# heavy `hyprctl reload` the main config uses.

[templates.shared-accent-ini]
input_path = "~/.config/matugen/templates/shared-accent.ini"
output_path = "~/.config/themes/accent.ini"
# fuzzel re-reads on every launch; no reload hook needed.
