# hyprmural — per-workspace wallpaper mapping
#
# Default location:
#   $XDG_CONFIG_HOME/hyprmural/hyprmural.conf, falling back to
#   $HOME/.config/hyprmural/hyprmural.conf
# Override with `hyprmural --config <path>`.
#
# Grammar:
#   fit = cover|contain|stretch|center|tile
#   default = <path>                # fallback when a workspace has no mapping
#   workspace = <id>, <path>        # optional, repeatable; explicit pin
#   hook = <shell command>          # run via /bin/sh -c on each per-output
#                                   # image change with HYPRMURAL_MONITOR /
#                                   # HYPRMURAL_WORKSPACE / HYPRMURAL_IMAGE
#   randomize = true|false          # off by default
#   wallpaper_dir = <glob>          # repeatable; POSIX glob(3), ~ expanded
#
# When `randomize = true`, every workspace without an explicit `workspace = `
# mapping picks a random image from the pool produced by the `wallpaper_dir`
# globs at first sight, and keeps that pick for the daemon's lifetime. Set
# `randomize = false` (or omit it) for the original strict-mapping behaviour.
#
# Workspace IDs may be integers or named (e.g. `special:scratchpad`).
# Tildes expand from $HOME.

fit = cover

# --- Mode A: explicit per-workspace mapping (the original behaviour) ---
# default = ~/.local/share/wallpapers/default.jpg
# workspace = 1, ~/.local/share/wallpapers/arch.png
# workspace = 2, ~/.local/share/wallpapers/tux.jpg
# workspace = special:scratchpad, ~/.local/share/wallpapers/scratch.png

# --- Mode B: random per session, drawn from one or more directories ---
# randomize = true
# wallpaper_dir = ~/.local/share/wallpapers/*
# wallpaper_dir = ~/Pictures/wallpapers/*.jpg

# Mix-and-match: randomize the unmapped workspaces, pin the ones you care
# about. The explicit mapping always wins.
# randomize = true
# wallpaper_dir = ~/.local/share/wallpapers/*
# workspace = 1, ~/.local/share/wallpapers/arch.png
